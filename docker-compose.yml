services:
  vibe-next:
    container_name: vibe-next
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${VIBE_NEXT_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_STORYBLOK_API_TOKEN: ${NEXT_PUBLIC_STORYBLOK_API_TOKEN}
      STORY_API_URL: ${STORY_API_URL:-http://laravel-proxy:8000/api/story}
    networks:
      - vibe-network
    restart: unless-stopped

networks:
  vibe-network:
    external: true
    name: vibe-network
